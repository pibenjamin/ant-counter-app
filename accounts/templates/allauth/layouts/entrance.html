{% extends "allauth/layouts/base.html" %}
{% load i18n %}
{% block body %}
<div class="container">
    <div class="allauth-card">
        <div class="card shadow">
            <div class="card-header bg-ant-gradient text-white text-center py-3">
                <h4 class="mb-0">🐜 AntCounter</h4>
            </div>
            <div class="card-body p-4">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2 small">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>
</div>
{% endblock body %}

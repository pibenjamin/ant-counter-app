{% extends "allauth/layouts/base.html" %}
{% load i18n %}
{% block body %}
<nav class="navbar navbar-expand-lg navbar-dark bg-ant-gradient mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'counter:dashboard' %}">🐜 AntCounter</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#manageNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="manageNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'counter:dashboard' %}">{% trans "Dashboard" %}</a>
                </li>
                <li class="nav-item">
                    <form method="post" action="{% url 'account_logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link border-0 bg-transparent">{% trans "Log out" %}</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}
            {% endblock content %}
        </div>
    </div>
</div>
{% endblock body %}
